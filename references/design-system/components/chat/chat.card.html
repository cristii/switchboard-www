<!-- @dsCard group="Components" viewport="700x300" name="Chat — message bubbles" subtitle="ChatBubble (bot / user) in the assistant widget" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin:0; background:var(--paper); padding:26px; font-family:var(--font-body);
    background-image:url("../../assets/grain.svg"); }
  .widget { max-width:380px; background:var(--paper); border:2px solid var(--ink); border-radius:18px;
    overflow:hidden; box-shadow:var(--shadow-pop); }
  .head { background:var(--dark); color:var(--paper); padding:14px 16px; display:flex; align-items:center; gap:11px; }
  .ava { width:34px; height:34px; border-radius:9px; background:var(--orange); display:grid; place-items:center; }
  .ava img { width:20px; height:20px; }
  .name { font-family:var(--font-display); font-weight:700; font-size:.95rem; }
  .status { font-size:.72rem; color:#b9c9b6; display:flex; align-items:center; gap:5px; }
  .dot { width:7px; height:7px; border-radius:50%; background:#5fcf7a; }
  .body { padding:16px; display:flex; flex-direction:column; gap:12px; background:var(--paper); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { ChatBubble } = window.SwitchboardDesignSystem_2b7957;
  function Demo() {
    return (
      <div className="widget">
        <div className="head">
          <span className="ava"><img src="../../assets/icons/assistant.svg" style={{filter:'brightness(0) invert(1)'}} alt="" /></span>
          <div>
            <div className="name">Switchboard Assistant</div>
            <div className="status"><span className="dot"></span> Online</div>
          </div>
        </div>
        <div className="body">
          <ChatBubble from="bot">Hi — I'm a live demo assistant. What would you like to know?</ChatBubble>
          <ChatBubble from="user">How much does it cost?</ChatBubble>
          <ChatBubble from="bot" showLabel={false}>Builds start at €399 for a Website Assistant. Want a free demo to see which fits?</ChatBubble>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
