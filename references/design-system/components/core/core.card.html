<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin:0; background:var(--paper); padding:26px; font-family:var(--font-body);
    background-image:url("../../assets/grain.svg"); }
  .row { display:flex; flex-wrap:wrap; align-items:center; gap:16px; margin-bottom:22px; }
  .lbl { font-family:var(--font-display); font-weight:700; font-size:.62rem; letter-spacing:.12em;
    text-transform:uppercase; color:var(--ink-soft); width:100%; margin-bottom:-6px; }
  h2.demo { font-family:var(--font-display); font-weight:800; font-size:1.5rem; letter-spacing:-.02em;
    margin:0; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, Eyebrow, HandUnderline, Badge, Pill } = window.SwitchboardDesignSystem_2b7957;
  function Demo() {
    return (
      <div>
        <div className="row"><span className="lbl">Buttons</span>
          <Button variant="primary" arrow>Try the chatbot</Button>
          <Button variant="ghost">Book a 15-min call</Button>
          <Button variant="primary" size="sm">Book a call</Button>
          <Button variant="ghost" disabled>Disabled</Button>
        </div>
        <div className="row"><span className="lbl">Eyebrow + hand underline</span>
          <Eyebrow>My services</Eyebrow>
          <h2 className="demo">Don't read about it. <span style={{color:'var(--orange)'}}><HandUnderline>Chat with it.</HandUnderline></span></h2>
        </div>
        <div className="row"><span className="lbl">Badges / tags</span>
          <Badge variant="green">Beginner</Badge>
          <Badge variant="amber">Intermediate</Badge>
          <Badge variant="violet">Advanced</Badge>
          <Badge variant="solid">Most popular</Badge>
          <Badge>Neutral</Badge>
        </div>
        <div className="row"><span className="lbl">Pills (conversion flow)</span>
          <Pill active>Conversation</Pill><span style={{color:'var(--orange)'}}>→</span>
          <Pill>Qualified lead</Pill><span style={{color:'var(--orange)'}}>→</span>
          <Pill>Booked call</Pill>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>

</html>
