<!-- @dsCard group="Colors" viewport="700x150" name="Ink & dark surfaces" subtitle="Text, hard borders, dark bands" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-body);background:var(--paper);padding:22px;}
  .row{display:flex;gap:14px;}
  .sw{flex:1;}
  .chip{height:74px;border-radius:10px;border:1.5px solid var(--ink);}
  .n{font-family:var(--font-display);font-weight:700;font-size:.8rem;margin-top:8px;}
  .v{font-size:.72rem;color:var(--ink-soft);font-variant-numeric:tabular-nums;}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#15211F"></div><div class="n">ink</div><div class="v">#15211F · text + borders</div></div>
    <div class="sw"><div class="chip" style="background:#54605C"></div><div class="n">ink-soft</div><div class="v">#54605C · muted text</div></div>
    <div class="sw"><div class="chip" style="background:#11201E"></div><div class="n">dark</div><div class="v">#11201E · dark band</div></div>
  </div>
</body></html>
