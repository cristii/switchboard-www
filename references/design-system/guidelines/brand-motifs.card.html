<!-- @dsCard group="Brand" viewport="700x180" name="Signature motifs" subtitle="Hand-drawn underline · grain · grid paper" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-body);color:var(--ink);
    background-color:var(--paper);
    background-image:
      repeating-linear-gradient(0deg, rgba(21,33,31,0.022) 0 1px, transparent 1px 32px),
      repeating-linear-gradient(90deg, rgba(21,33,31,0.022) 0 1px, transparent 1px 32px),
      url("../assets/grain.svg");
    padding:34px 26px;}
  h2{font-family:var(--font-display);font-weight:800;font-size:2rem;letter-spacing:-.02em;margin:0;}
  .ul{position:relative;white-space:nowrap;color:var(--orange);}
  .ul svg{position:absolute;left:-2%;bottom:-.32em;width:104%;height:.45em;overflow:visible;}
  .ul path{fill:none;stroke:var(--orange);stroke-width:7;stroke-linecap:round;}
  .cap{font-size:.72rem;color:var(--ink-soft);margin-top:24px;font-family:var(--font-display);
    font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
</style></head>
<body>
  <h2>Don't read about it. <span class="ul">Chat with it.<svg viewBox="0 0 300 20" preserveAspectRatio="none"><path d="M4 14 C 60 6, 120 18, 180 9 S 280 6, 296 12"/></svg></span></h2>
  <div class="cap">Hand-drawn underline · 0.022-alpha 32px grid · fractal-noise grain overlay</div>
</body></html>
