<!-- @dsCard group="Colors" viewport="700x150" name="Paper neutrals" subtitle="Recycled-paper backgrounds & surfaces" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-body);background:var(--paper);padding:22px;}
  .row{display:flex;gap:14px;}
  .sw{flex:1;}
  .chip{height:74px;border-radius:10px;border:1.5px solid var(--ink);}
  .n{font-family:var(--font-display);font-weight:700;font-size:.8rem;margin-top:8px;}
  .v{font-size:.72rem;color:var(--ink-soft);font-variant-numeric:tabular-nums;}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#E9E8DF"></div><div class="n">paper</div><div class="v">#E9E8DF</div></div>
    <div class="sw"><div class="chip" style="background:#E1E2D7"></div><div class="n">paper-2</div><div class="v">#E1E2D7</div></div>
    <div class="sw"><div class="chip" style="background:#D7D9CB"></div><div class="n">paper-3</div><div class="v">#D7D9CB</div></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="n">white</div><div class="v">#FFFFFF</div></div>
  </div>
</body></html>
