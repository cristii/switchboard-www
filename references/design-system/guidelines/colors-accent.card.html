<!-- @dsCard group="Colors" viewport="700x150" name="Brand accent — burnt orange" subtitle="The single accent: CTAs, links, emphasis" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-body);background:var(--paper);padding:22px;}
  .row{display:flex;gap:14px;}
  .sw{flex:1;}
  .chip{height:74px;border-radius:10px;border:1.5px solid var(--ink);}
  .n{font-family:var(--font-display);font-weight:700;font-size:.8rem;margin-top:8px;}
  .v{font-size:.72rem;color:var(--ink-soft);font-variant-numeric:tabular-nums;}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#B45309"></div><div class="n">orange</div><div class="v">#B45309 · accent / CTA</div></div>
    <div class="sw"><div class="chip" style="background:#92400E"></div><div class="n">orange-deep</div><div class="v">#92400E · border / pressed</div></div>
    <div class="sw"><div class="chip" style="background:#FBBF24"></div><div class="n">amber</div><div class="v">#FBBF24 · eyebrow on dark</div></div>
  </div>
</body></html>
