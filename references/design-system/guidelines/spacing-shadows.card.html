<!-- @dsCard group="Spacing" viewport="700x170" name="Hard offset shadows" subtitle="Blur-free ink/orange blocks — the brand signature" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-body);background:var(--paper);padding:30px 26px;}
  .row{display:flex;gap:34px;align-items:flex-start;}
  .box{width:90px;height:54px;border-radius:12px;border:1.5px solid var(--ink);background:var(--white);}
  .n{font-family:var(--font-display);font-weight:700;font-size:.74rem;margin-top:14px;}
  .v{font-size:.66rem;color:var(--ink-soft);}
</style></head>
<body>
  <div class="row">
    <div><div class="box" style="box-shadow:4px 4px 0 rgba(21,33,31,.1)"></div><div class="n">card</div><div class="v">4px 4px 0</div></div>
    <div><div class="box" style="box-shadow:6px 6px 0 rgba(21,33,31,.14)"></div><div class="n">raised</div><div class="v">6px 6px 0</div></div>
    <div><div class="box" style="box-shadow:8px 8px 0 rgba(21,33,31,.16)"></div><div class="n">pop</div><div class="v">8px 8px 0</div></div>
    <div><div class="box" style="box-shadow:3px 3px 0 var(--ink)"></div><div class="n">button</div><div class="v">3px 3px 0 ink</div></div>
    <div><div class="box" style="border-color:var(--orange);box-shadow:5px 5px 0 var(--orange)"></div><div class="n">accent</div><div class="v">5px 5px 0 orange</div></div>
  </div>
</body></html>
