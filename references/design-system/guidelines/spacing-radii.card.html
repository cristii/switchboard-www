<!-- @dsCard group="Spacing" viewport="700x160" name="Radii & borders" subtitle="9–18px radii · the 1.5–2px ink outline" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-body);background:var(--paper);padding:26px;}
  .row{display:flex;gap:26px;align-items:flex-start;}
  .box{width:84px;height:54px;background:var(--white);border:1.5px solid var(--ink);}
  .n{font-family:var(--font-display);font-weight:700;font-size:.74rem;margin-top:12px;}
  .v{font-size:.66rem;color:var(--ink-soft);}
</style></head>
<body>
  <div class="row">
    <div><div class="box" style="border-radius:9px"></div><div class="n">r-sm</div><div class="v">9px · inputs, chips</div></div>
    <div><div class="box" style="border-radius:14px"></div><div class="n">r</div><div class="v">14px · cards</div></div>
    <div><div class="box" style="border-radius:18px"></div><div class="n">r-lg</div><div class="v">18px · chat widget</div></div>
    <div><div class="box" style="border-radius:20px;width:54px"></div><div class="n">r-pill</div><div class="v">20px · pills/tags</div></div>
    <div><div class="box" style="border-radius:10px;border-width:2px"></div><div class="n">border</div><div class="v">2px ink · buttons</div></div>
  </div>
</body></html>
