<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Switchboard AI Systems — Don't read about my service. Chat with it.</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    color: var(--ink);
    background-color: var(--paper);
    background-image:
      repeating-linear-gradient(0deg, rgba(21,33,31,0.022) 0 1px, transparent 1px 32px),
      repeating-linear-gradient(90deg, rgba(21,33,31,0.022) 0 1px, transparent 1px 32px),
      url("../../assets/grain.svg");
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  hr.divline { border: 0; border-top: 1.5px solid var(--ink); margin: 0; }
  @keyframes blink { 0%,60%,100% { opacity: .3 } 30% { opacity: 1 } }
  @keyframes pop { from { opacity: 0; transform: translateY(6px) } to { opacity: 1; transform: none } }
  :focus-visible { outline: 3px solid var(--orange); outline-offset: 2px; border-radius: 4px; }
  @media (max-width: 980px) {
    .hero-grid, .svc-grid, .about-grid, .build-main { grid-template-columns: 1fr !important; }
    .quotes, .price-grid, .faq-list, .about-cols { grid-template-columns: 1fr !important; }
    .steps { grid-template-columns: repeat(2,1fr) !important; }
    .build-list { grid-template-columns: 1fr !important; }
    .navlinks { display: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="ChatWidget.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Proof.jsx"></script>
<script type="text/babel" src="Services.jsx"></script>
<script type="text/babel" src="SampleBuilds.jsx"></script>
<script type="text/babel" src="Process.jsx"></script>
<script type="text/babel" src="Pricing.jsx"></script>
<script type="text/babel" src="About.jsx"></script>
<script type="text/babel" src="FAQ.jsx"></script>
<script type="text/babel" src="FooterCTA.jsx"></script>
<script type="text/babel" data-presets="react">
  function App() {
    return (
      <React.Fragment>
        <Header />
        <Hero />
        <hr className="divline" />
        <Proof />
        <Services />
        <SampleBuilds />
        <Process />
        <Pricing />
        <About />
        <FAQ />
        <FooterCTA />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
